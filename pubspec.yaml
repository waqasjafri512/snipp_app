version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.2
  permission_handler: ^11.3.1
  agora_rtc_engine: ^6.3.2
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
