  socket_io_client: ^3.0.0
  shared_preferences: ^2.2.3
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
#  image_cropper: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
